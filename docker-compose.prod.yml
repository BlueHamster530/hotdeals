# 운영(Lightsail) 통합 배포. 단일 인스턴스에 전체 스택을 띄운다.
# 보안: db는 포트를 공개하지 않고(내부 네트워크만), 외부엔 nginx(80/443)만 노출.
#
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build
#
# 최초 1회 스키마 생성:
#   docker compose -f docker-compose.prod.yml --env-file .env.prod run --rm api python -m app.cli init-db

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # ports 매핑 없음 — 외부 비노출(내부 hotdeals 네트워크로만 접근)

  api:
    build: .
    image: hotdeals-backend:local
    restart: unless-stopped
    env_file: .env.prod
    environment:
      POSTGRES_HOST: db
    depends_on:
      db:
        condition: service_healthy
    # 외부 비노출 — nginx가 /api 로 프록시

  worker:
    build: .
    image: hotdeals-backend:local
    restart: unless-stopped
    env_file: .env.prod
    environment:
      POSTGRES_HOST: db
    command: ["python", "-m", "app.cli", "loop"]
    depends_on:
      api:
        condition: service_started
      db:
        condition: service_healthy

  bot:
    build: .
    image: hotdeals-backend:local
    restart: unless-stopped
    env_file: .env.prod
    environment:
      POSTGRES_HOST: db
    command: ["python", "-m", "app.cli", "bot"]
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./web
      args:
        NEXT_PUBLIC_API_BASE: ""
    image: hotdeals-web:local
    restart: unless-stopped
    depends_on:
      - api

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certbot/www:/var/www/certbot:ro
      - ./nginx/certbot/conf:/etc/letsencrypt:ro
    depends_on:
      - api
      - web

volumes:
  pgdata:
