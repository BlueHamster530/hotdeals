# 운영(Lightsail) 통합 배포. 단일 인스턴스에 전체 스택을 띄운다.
# 보안: db는 포트를 공개하지 않고(내부 네트워크만), 외부엔 nginx(80/443)만 노출.
#
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build
#
# 최초 1회 스키마 생성:
#   docker compose -f docker-compose.prod.yml --env-file .env.prod run --rm api python -m app.cli init-db

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # ports 매핑 없음 — 외부 비노출(내부 hotdeals 네트워크로만 접근)

  api:
    build: .
    image: hotdeals-backend:local
    restart: unless-stopped
    env_file: .env.prod
    environment:
      POSTGRES_HOST: db
    volumes:
      - imgcache:/cache       # 이미지 디스크 캐시(우리 서버에서 서빙)
    depends_on:
      db:
        condition: service_healthy
    # 외부 비노출 — nginx가 /api 로 프록시

  worker:
    build: .
    image: hotdeals-backend:local
    restart: unless-stopped
    env_file: .env.prod
    environment:
      POSTGRES_HOST: db
    command: ["python", "-m", "app.cli", "loop"]
    depends_on:
      api:
        condition: service_started
      db:
        condition: service_healthy

  # bot:
  #   텔레그램 봇 — 나중에 도입 예정(부가 기능, 우선순위 낮음). TELEGRAM_BOT_TOKEN 없이 계속
  #   재시작 루프에 빠지는 문제로 주석 처리. 재도입 시 이 블록 해제 + .env.prod 토큰 채우기.
  #   build: .
  #   image: hotdeals-backend:local
  #   restart: unless-stopped
  #   env_file: .env.prod
  #   environment:
  #     POSTGRES_HOST: db
  #   command: ["python", "-m", "app.cli", "bot"]
  #   depends_on:
  #     db:
  #       condition: service_healthy

  web:
    build:
      context: ./web
      args:
        NEXT_PUBLIC_API_BASE: ""
    image: hotdeals-web:local
    restart: unless-stopped
    depends_on:
      - api

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certbot/www:/var/www/certbot:ro
      - ./nginx/certbot/conf:/etc/letsencrypt:ro
      # needcomputer 프로젝트(별도 저장소, ~/needcomputer)의 정적 프론트 빌드 결과물.
      # /checkcomputer 서브패스로 얹기 위함(default.conf 참고). API는 needcomputer-api
      # 컨테이너가 hotdeals_default 네트워크를 공유해서 리버스 프록시로 연결.
      - ../needcomputer/web/dist:/var/www/checkcomputer:ro
    depends_on:
      - api
      - web

volumes:
  pgdata:
  imgcache:
