# 리버스 프록시. 초기엔 HTTP만. 도메인+DNS 연결 후 certbot으로 인증서를 받고
# DEPLOY.md의 HTTPS 블록을 추가하면 HTTPS로 전환된다.
#
# 재배포 안정성: upstream 블록 대신 Docker 내장 DNS(127.0.0.11) + 변수 proxy_pass 사용.
# 이렇게 하면 api/web 컨테이너가 재생성되어 IP가 바뀌어도 nginx가 자동 재해석한다
# (upstream 블록은 시작 시점 IP를 고정해 재배포 후 502를 유발).

server {
    listen 80;
    server_name _;
    resolver 127.0.0.11 valid=30s ipv6=off;

    # Let's Encrypt 인증용 (certbot webroot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # API → FastAPI
    location /api/ {
        set $api http://api:8000;
        proxy_pass $api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /healthz {
        set $api_health http://api:8000;
        proxy_pass $api_health;
    }

    # 그 외 모두 → Next.js
    location / {
        set $web http://web:3000;
        proxy_pass $web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
