# 리버스 프록시. HTTPS 전환 완료(bhhotdeals.duckdns.org, Let's Encrypt).
#
# 재배포 안정성: upstream 블록 대신 Docker 내장 DNS(127.0.0.11) + 변수 proxy_pass 사용.
# 이렇게 하면 api/web 컨테이너가 재생성되어 IP가 바뀌어도 nginx가 자동 재해석한다
# (upstream 블록은 시작 시점 IP를 고정해 재배포 후 502를 유발).

server {
    listen 80;
    server_name bhhotdeals.duckdns.org;

    # Let's Encrypt 인증용 (certbot webroot, 갱신 시에도 필요)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 그 외 전부 HTTPS로 리다이렉트
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name bhhotdeals.duckdns.org;
    resolver 127.0.0.11 valid=30s ipv6=off;

    ssl_certificate     /etc/letsencrypt/live/bhhotdeals.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bhhotdeals.duckdns.org/privkey.pem;

    # API → FastAPI
    location /api/ {
        set $api http://api:8000;
        proxy_pass $api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /healthz {
        set $api_health http://api:8000;
        proxy_pass $api_health;
    }

    # needcomputer 프로젝트 (별도 저장소, 같은 인스턴스에 /checkcomputer 서브패스로 얹음)
    # API → ASP.NET Core (needcomputer-api 컨테이너, hotdeals_default 네트워크 공유)
    #
    # 주의 1: proxy_pass 대상이 변수(재해석용)면 nginx가 location 프리픽스를 자동으로
    # 벗겨주지 않는다(리터럴 proxy_pass일 때만 그 동작을 함) — 그래서 rewrite로 직접
    # /checkcomputer/api/ 를 /api/ 로 바꾼 뒤, URI 없는 proxy_pass로 그 결과를 그대로 전달한다.
    # (실제 겪은 버그1: 이 처리 없이는 백엔드에 /checkcomputer/api/games가 그대로 전달돼 404)
    # 주의 2: set은 rewrite...break보다 반드시 먼저 와야 한다 — break는 이후의 rewrite모듈
    # 지시어(set 포함) 처리를 그 자리에서 멈춰버려서, 순서가 바뀌면 $needcomputer_api가
    # 초기화되지 않아 500(uninitialized variable)이 난다(실제 겪은 버그2).
    location /checkcomputer/api/ {
        set $needcomputer_api http://needcomputer-api:8080;
        rewrite ^/checkcomputer/api/(.*)$ /api/$1 break;
        proxy_pass $needcomputer_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 정적 프론트(React 빌드 결과물)는 컨테이너 없이 nginx가 직접 서빙
    location /checkcomputer/ {
        alias /var/www/checkcomputer/;
        try_files $uri $uri/ /checkcomputer/index.html;
    }

    # 그 외 모두 → Next.js
    location / {
        set $web http://web:3000;
        proxy_pass $web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
